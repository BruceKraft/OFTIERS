<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OF Tiers — Rankings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:  #13151c;
    --bg2: #1a1d26;
    --bg3: #222632;
    --border: rgba(255,255,255,0.08);
    --border-bright: rgba(255,255,255,0.15);
    --text: #eceef5;
    --muted: #7a7f96;
    --accent: #4ade80;
    --accent-dim: rgba(74,222,128,0.12);

    --gold-bg:   rgba(255,215,0,0.10);   --gold-bd:   rgba(255,215,0,0.28);
    --silver-bg: rgba(192,200,216,0.08); --silver-bd: rgba(192,200,216,0.22);
    --bronze-bg: rgba(205,127,50,0.10);  --bronze-bd: rgba(205,127,50,0.26);

    --t1: #ffd700; --t1-bg: rgba(255,215,0,0.13);   --t1-bd: rgba(255,215,0,0.32);
    --t2: #f5820a; --t2-bg: rgba(245,130,10,0.13);  --t2-bd: rgba(245,130,10,0.32);
    --t3: #e05252; --t3-bg: rgba(224,82,82,0.13);   --t3-bd: rgba(224,82,82,0.32);
    --t4: #9b7bf7; --t4-bg: rgba(155,123,247,0.13); --t4-bd: rgba(155,123,247,0.32);
    --t5: #6a6a8e; --t5-bg: rgba(106,106,142,0.13); --t5-bd: rgba(106,106,142,0.32);
  }

  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 16px; min-height: 100vh; line-height: 1.5; }

  /* HEADER */
  header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 2rem; position: sticky; top: 0; z-index: 100; }
  .header-inner { max-width: 1300px; margin: 0 auto; display: flex; align-items: center; gap: 2rem; height: 60px; }
  .site-logo { font-family: 'Press Start 2P', monospace; font-size: 11px; color: var(--accent); letter-spacing: 1px; white-space: nowrap; text-shadow: 0 0 20px rgba(74,222,128,0.4); text-decoration: none; }
  .header-nav { display: flex; align-items: center; gap: 1.5rem; margin-left: auto; }
  .header-nav a { color: var(--muted); font-size: 14px; font-weight: 600; text-decoration: none; letter-spacing: 0.5px; transition: color 0.15s; }
  .header-nav a:hover { color: var(--text); }
  .header-nav a.active { color: var(--accent); }

  /* TABS */
  .tabs-bar { background: var(--bg2); border-bottom: 1px solid var(--border); }
  .tabs-inner { max-width: 1300px; margin: 0 auto; display: flex; overflow-x: auto; scrollbar-width: none; }
  .tabs-inner::-webkit-scrollbar { display: none; }
  .tab-btn { display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 10px 18px; font-family: 'Rajdhani', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.4px; color: var(--muted); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; transition: color 0.15s, border-color 0.15s; }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
  .mode-icon { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; transition: opacity 0.15s; opacity: 0.6; flex-shrink: 0; }
  .tab-btn:hover .mode-icon { opacity: 1; }
  .tab-btn.active .mode-icon { opacity: 1; }
  .mode-icon svg { width: 22px; height: 22px; display: block; }
  .mode-icon img { width: 34px; height: 34px; object-fit: contain; }

  .mi-overall svg { fill:#ffc130; }
  .mi-vanilla svg { fill:#60c090; }
  .mi-uhc     svg { fill:#e05050; }
  .mi-pot     svg { fill:#c070d0; }
  .mi-nethop  svg { fill:#e07030; }
  .mi-smp     svg { fill:#40c040; }
  .mi-sword   svg { fill:#4090d0; }
  .mi-axe     svg { fill:#c07840; }
  .mi-mace    svg { fill:#8080c0; }
  .mi-dsmp    svg { fill:#60b0ff; }
  .mi-cart    svg { fill:#d0a030; }
  .mi-spearmace img { opacity: 0.9; mix-blend-mode: screen; }
  .mi-axe img { mix-blend-mode: screen; }
  /* JPEG images don't support transparency; give the icon container the same
     background as the tabs bar so mix-blend-mode: screen can properly
     "erase" the black background within the opacity compositing group. */
  .mi-axe, .mi-spearmace { background-color: var(--bg2); border-radius: 6px; }

  /* MAIN */
  main { max-width: 1300px; margin: 0 auto; padding: 2rem; display: grid; grid-template-columns: 1fr 250px; gap: 1.5rem; align-items: start; }

  /* TABLE */
  .rankings-wrap { min-width: 0; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .section-title { font-family: 'Press Start 2P', monospace; font-size: 9px; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; }
  .search-box { background: var(--bg2); border: 1px solid var(--border-bright); border-radius: 8px; padding: 8px 14px; color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 15px; width: 220px; outline: none; transition: border-color 0.15s; }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

  table { width: 100%; border-collapse: collapse; font-size: 15px; }
  thead th { text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); }
  thead th.right { text-align: right; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; cursor: pointer; }
  tbody tr:hover { background: rgba(255,255,255,0.04); }
  tbody td { padding: 13px 14px; vertical-align: middle; }

  tr.rank-gold   { background: var(--gold-bg)  !important; border-left: 3px solid rgba(255,215,0,0.5); }
  tr.rank-silver { background: var(--silver-bg) !important; border-left: 3px solid rgba(192,200,216,0.4); }
  tr.rank-bronze { background: var(--bronze-bg) !important; border-left: 3px solid rgba(205,127,50,0.5); }
  tr.rank-gold:hover   { background: rgba(255,215,0,0.16)    !important; }
  tr.rank-silver:hover { background: rgba(192,200,216,0.13)  !important; }
  tr.rank-bronze:hover { background: rgba(205,127,50,0.16)   !important; }

  .rank-num   { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--muted); min-width: 36px; display: inline-block; text-align: center; }
  .rank-medal { font-size: 22px; display: inline-block; width: 36px; text-align: center; }

  .player-cell { display: flex; align-items: center; gap: 12px; }
  .player-avatar { width: 38px; height: 38px; border-radius: 6px; background: var(--bg2); border: 1px solid var(--border-bright); flex-shrink: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .avatar-placeholder { font-family: 'Press Start 2P', monospace; font-size: 6px; color: var(--muted); }
  .player-name { font-weight: 700; font-size: 16px; letter-spacing: 0.3px; color: var(--text); }

  .region-badge { display: inline-block; padding: 3px 9px; border-radius: 5px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; background: var(--bg3); border: 1px solid var(--border-bright); color: var(--muted); }

  .tiers-cell { display: flex; flex-wrap: wrap; gap: 4px; justify-content: flex-end; align-items: center; }
  .tier-badge { display: inline-block; padding: 4px 9px; border-radius: 5px; font-family: 'Press Start 2P', monospace; font-size: 7px; letter-spacing: 0.5px; }
  .tier-Tier\ 1 { color: var(--t1); background: var(--t1-bg); border: 1px solid var(--t1-bd); }
  .tier-Tier\ 2 { color: var(--t2); background: var(--t2-bg); border: 1px solid var(--t2-bd); }
  .tier-Tier\ 3 { color: var(--t3); background: var(--t3-bg); border: 1px solid var(--t3-bd); }
  .tier-Tier\ 4 { color: var(--t4); background: var(--t4-bg); border: 1px solid var(--t4-bd); }
  .tier-Tier\ 5 { color: var(--t5); background: var(--t5-bg); border: 1px solid var(--t5-bd); }
  .points-label { font-size: 14px; color: var(--text); font-weight: 700; }

  .empty-row td { text-align: center; color: var(--muted); padding: 3rem; font-size: 13px; }

  /* PAGINATION */
  .pagination { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 1.5rem; }
  .page-btn { background: var(--bg2); border: 1px solid var(--border-bright); border-radius: 6px; color: var(--muted); font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 700; padding: 6px 13px; cursor: pointer; transition: all 0.15s; }
  .page-btn:hover { border-color: var(--accent); color: var(--accent); }
  .page-btn.active { background: var(--accent-dim); border-color: rgba(74,222,128,0.4); color: var(--accent); }
  .page-btn:disabled { opacity: 0.3; cursor: default; }

  /* SIDEBAR */
  .sidebar { display: flex; flex-direction: column; gap: 1rem; position: sticky; top: 80px; }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 1.4rem; }
  .card-title { font-family: 'Press Start 2P', monospace; font-size: 8px; letter-spacing: 1px; color: var(--muted); margin-bottom: 1rem; }
  .tier-legend { display: flex; flex-direction: column; gap: 8px; }
  .legend-row { display: flex; align-items: center; gap: 10px; }
  .legend-pts { margin-left: auto; font-size: 12px; color: var(--muted); font-weight: 700; }
  .legend-desc { font-size: 13px; color: var(--muted); font-weight: 600; }

  /* PROFILE MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.72); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--border-bright); border-radius: 18px; padding: 2rem; width: 400px; max-width: 95vw; position: relative; animation: popIn 0.18s ease; }
  @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal-close { position: absolute; top: 14px; right: 14px; background: rgba(255,255,255,0.08); border: none; border-radius: 50%; width: 34px; height: 34px; cursor: pointer; color: var(--muted); font-size: 20px; display: flex; align-items: center; justify-content: center; transition: background 0.15s; line-height: 1; }
  .modal-close:hover { background: rgba(255,255,255,0.15); color: var(--text); }

  .modal-avatar-wrap { text-align: center; margin-bottom: 1.1rem; }
  .modal-avatar { width: 80px; height: 160px; border-radius: 10px; border: 2px solid var(--border-bright); display: block; margin: 0 auto 0.8rem; background: var(--bg); object-fit: contain; image-rendering: pixelated; }
  .modal-name { font-family: 'Press Start 2P', monospace; font-size: 13px; color: var(--text); text-align: center; margin-bottom: 0.5rem; }
  .modal-rank-badge { display: block; width: fit-content; margin: 0 auto 0.8rem; padding: 4px 14px; border-radius: 20px; background: var(--accent-dim); border: 1px solid rgba(74,222,128,0.3); color: var(--accent); font-size: 13px; font-weight: 700; }
  .modal-meta { display: flex; align-items: center; justify-content: center; gap: 0.75rem; margin-bottom: 1.3rem; flex-wrap: wrap; }
  .modal-region { font-size: 13px; color: var(--muted); font-weight: 600; }
  .modal-namemc { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 5px; background: var(--bg3); border: 1px solid var(--border-bright); color: var(--muted); font-size: 12px; font-weight: 700; text-decoration: none; transition: border-color 0.15s, color 0.15s; }
  .modal-namemc:hover { border-color: var(--accent); color: var(--accent); }

  .modal-section { margin-bottom: 1.1rem; }
  .modal-section-title { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 0.6rem; }
  .modal-position { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 0.8rem 1rem; display: flex; align-items: center; gap: 0.75rem; }
  .modal-pos-num { font-family: 'Press Start 2P', monospace; font-size: 16px; color: var(--text); }
  .modal-pos-label { font-size: 13px; color: var(--muted); font-weight: 600; }
  .modal-pos-pts { margin-left: auto; font-size: 14px; font-weight: 700; color: var(--accent); }

  .modal-tiers-grid { display: flex; flex-direction: column; gap: 6px; }
  .modal-tier-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-radius: 8px; background: var(--bg3); border: 1px solid var(--border); }
  .modal-tier-row:last-child { border-bottom: 1px solid var(--border); }
  .modal-tier-mode { font-size: 14px; color: var(--text); font-weight: 700; }

  footer { text-align: center; padding: 2rem; color: var(--muted); font-size: 12px; border-top: 1px solid var(--border); margin-top: 2rem; }

  /* PROFILE LIST (Overall tab) */
  .profile-list { display: flex; flex-direction: column; gap: 8px; }

  .profile-row {
    background: var(--bg2);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: background 0.12s, transform 0.1s;
  }
  .profile-row:hover { background: rgba(255,255,255,0.05); transform: translateX(3px); }

  /* Rank 1/2/3 borders — applied on ALL tabs */
  .profile-row.rank-gold,
  tr.rank-gold   { border-color: #ffd700 !important; box-shadow: 0 0 12px rgba(255,215,0,0.22); }
  .profile-row.rank-silver,
  tr.rank-silver { border-color: #c0c8d8 !important; box-shadow: 0 0 10px rgba(192,200,216,0.18); }
  .profile-row.rank-bronze,
  tr.rank-bronze { border-color: #cd7f32 !important; box-shadow: 0 0 10px rgba(205,127,50,0.18); }

  tr.rank-gold   { background: var(--gold-bg)   !important; border-left: 3px solid #ffd700 !important; }
  tr.rank-silver { background: var(--silver-bg)  !important; border-left: 3px solid #c0c8d8 !important; }
  tr.rank-bronze { background: var(--bronze-bg)  !important; border-left: 3px solid #cd7f32 !important; }
  tr.rank-gold:hover   { background: rgba(255,215,0,0.16)   !important; }
  tr.rank-silver:hover { background: rgba(192,200,216,0.13) !important; }
  tr.rank-bronze:hover { background: rgba(205,127,50,0.16)  !important; }

  /* Tier outline colors (overall pts) */
  .profile-row.outline-t1 { border-color: var(--t1); box-shadow: 0 0 10px rgba(255,215,0,0.15); }
  .profile-row.outline-t2 { border-color: var(--t2); box-shadow: 0 0 10px rgba(245,130,10,0.15); }
  .profile-row.outline-t3 { border-color: var(--t3); }
  .profile-row.outline-t4 { border-color: var(--t4); }
  .profile-row.outline-t5 { border-color: var(--t5); }

  .row-rank { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--muted); min-width: 32px; text-align: center; flex-shrink: 0; }
  .row-rank.gold   { color: #ffd700; }
  .row-rank.silver { color: #c0c8d8; }
  .row-rank.bronze { color: #cd7f32; }

  .row-skin { width: 36px; height: 72px; image-rendering: pixelated; object-fit: contain; flex-shrink: 0; display: block; }
  .row-info { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 0; }
  .row-name { font-weight: 700; font-size: 16px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row-region { font-size: 11px; font-weight: 700; color: var(--muted); background: var(--bg3); border: 1px solid var(--border-bright); border-radius: 4px; padding: 2px 7px; width: fit-content; }
  .row-pts { font-size: 15px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
  .row-pts.pts-t1 { color: var(--t1); }
  .row-pts.pts-t2 { color: var(--t2); }
  .row-pts.pts-t3 { color: var(--t3); }
  .row-pts.pts-t4 { color: var(--t4); }
  .row-pts.pts-t5 { color: var(--t5); }
  .row-pts.pts-none { color: var(--muted); }

  @media (max-width: 900px) { main { grid-template-columns: 1fr; } .sidebar { position: static; order: -1; } }
  @media (max-width: 480px) { header { padding: 0 1rem; } main { padding: 1rem; } .search-box { width: 150px; } .row-skin { width: 28px; height: 56px; } }
</style>
</head>
<body>

<!-- PROFILE MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModalBtn()">×</button>
    <div class="modal-avatar-wrap">
      <img class="modal-avatar" id="modal-avatar" src="" alt="">
      <div class="modal-name" id="modal-name"></div>
      <div class="modal-rank-badge" id="modal-rank-badge"></div>
    </div>
    <div class="modal-meta">
      <span class="modal-region" id="modal-region"></span>
      <a class="modal-namemc" id="modal-namemc" href="#" target="_blank">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        NameMC
      </a>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Position</div>
      <div class="modal-position">
        <span class="modal-pos-num" id="modal-pos"></span>
        <span class="modal-pos-label">Overall</span>
        <span class="modal-pos-pts" id="modal-pts"></span>
      </div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Tiers</div>
      <div class="modal-tiers-grid" id="modal-tiers"></div>
    </div>
  </div>
</div>

<header>
  <div class="header-inner">
    <a href="#" class="site-logo">★ OF TIERS</a>
    <nav class="header-nav">
    </nav>
  </div>
</header>

<div class="tabs-bar">
  <div class="tabs-inner" id="tabs">

    <button class="tab-btn active" data-cat="overall">
      <span class="mode-icon mi-overall"><svg viewBox="0 0 24 24"><path d="M12 2L9.5 8.5H3l5.5 4-2 6.5L12 15l5.5 3.5-2-6.5L21 8.5h-6.5z"/></svg></span>
      Overall

<script>
const TIERS        = ['Tier 1','Tier 2','Tier 3','Tier 4','Tier 5'];
const POINTS       = {'Tier 1':10,'Tier 2':7,'Tier 3':4,'Tier 4':2,'Tier 5':1};
const SCORE_MODES  = ['vanilla','uhc','pot','nethop','smp','sword','axe','mace','spearmace','diamondsmp','cart'];
const LABELS       = { overall:'Overall Rankings', vanilla:'Vanilla Rankings', uhc:'UHC Rankings', pot:'Pot Rankings', nethop:'NethOP Rankings', smp:'SMP Rankings', sword:'Sword Rankings', axe:'Axe Rankings', mace:'Mace Rankings', spearmace:'Spear Mace Rankings', diamondsmp:'Diamond SMP Rankings', cart:'Cart Rankings' };
const MODE_LABELS  = { overall:'Overall', vanilla:'Vanilla', uhc:'UHC', pot:'Pot', nethop:'NethOP', smp:'SMP', sword:'Sword', axe:'Axe', mace:'Mace', spearmace:'Spear Mace', diamondsmp:'Diamond SMP', cart:'Cart' };
const REGION_NAMES = { NA:'North America', AU:'Australia', EU:'Europe', AS:'Asia' };
const RANK_TITLES  = [[50,'Combat Grandmaster'],[35,'Master'],[20,'Elite'],[12,'Expert'],[7,'Skilled'],[3,'Amateur'],[1,'Rookie'],[0,'Unranked']];
const DATA_URL     = 'https://raw.githubusercontent.com/BruceKraft/OFTiers/main/players.json';

let allPlayers = [], currentCat = 'overall', currentPage = 1, filtered = [];
const PER_PAGE = 100;

function getPoints(p) {
  return SCORE_MODES.reduce((s, m) => s + (POINTS[p.tiers?.[m]] || 0), 0);
}
function getRankTitle(pts) {
  for (const [t, title] of RANK_TITLES) if (pts >= t) return title;
  return 'Unranked';
}

async function fetchPlayers() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    allPlayers = Object.values(data.players || {});
  } catch(e) { console.error('Failed to load players:', e); }
}

function getPlayersForMode(mode) {
  if (mode === 'overall') {
    return allPlayers
      .map(p => ({ ...p, _pts: getPoints(p) }))
      .sort((a, b) => b._pts - a._pts)
      .map((p, i) => ({ rank: i+1, name: p.name, region: p.region, mainTier: p.tiers?.overall || null, pts: p._pts }));
  }
  return allPlayers
    .filter(p => p.tiers?.[mode])
    .sort((a, b) => TIERS.indexOf(a.tiers[mode]) - TIERS.indexOf(b.tiers[mode]))
    .map((p, i) => ({ rank: i+1, name: p.name, region: p.region, mainTier: p.tiers[mode], pts: null }));
}

function skinUrl(name)   { return `https://mc-heads.net/body/${encodeURIComponent(name)}/80`; }
function avatarUrl(name) { return `https://mc-heads.net/avatar/${encodeURIComponent(name)}/38`; }

function rankClass(r) { return r===1?'rank-gold':r===2?'rank-silver':r===3?'rank-bronze':''; }
function rankLabelClass(r) { return r===1?'gold':r===2?'silver':r===3?'bronze':''; }

function getTierOutlineClass(pts) {
  if (pts >= 10) return 'outline-t1';
  if (pts >= 7)  return 'outline-t2';
  if (pts >= 4)  return 'outline-t3';
  if (pts >= 2)  return 'outline-t4';
  if (pts >= 1)  return 'outline-t5';
  return '';
}
function getPtsColorClass(pts) {
  if (pts >= 10) return 'pts-t1';
  if (pts >= 7)  return 'pts-t2';
  if (pts >= 4)  return 'pts-t3';
  if (pts >= 2)  return 'pts-t4';
  if (pts >= 1)  return 'pts-t5';
  return 'pts-none';
}

function renderTable(players, page) {
  const isOverall = currentCat === 'overall';
  const container = document.getElementById('table-container');
  const slice = players.slice((page-1)*PER_PAGE, page*PER_PAGE);

  if (isOverall) {
    document.getElementById('rankings-table').style.display = 'none';
    let list = document.getElementById('profile-list');
    if (!list) {
      list = document.createElement('div');
      list.id = 'profile-list';
      list.className = 'profile-list';
      container.appendChild(list);
    }
    list.style.display = 'flex';
    if (!slice.length) { list.innerHTML = '<p style="color:var(--muted);text-align:center;padding:2rem">No players ranked yet.</p>'; return; }
    list.innerHTML = slice.map(p => {
      const initials = p.name.replace(/[^A-Za-z]/g,'').slice(0,2).toUpperCase() || '??';
      const rc = rankClass(p.rank);
      const rlc = rankLabelClass(p.rank);
      const outline = rc ? '' : getTierOutlineClass(p.pts);
      const ptsColor = getPtsColorClass(p.pts);
      return `<div class="profile-row ${rc} ${outline}" onclick="openModal('${p.name.replace(/'/g,"\\'")}')">
        <span class="row-rank ${rlc}">#${p.rank}</span>
        <img class="row-skin" src="${skinUrl(p.name)}"
          onerror="this.style.visibility='hidden'" alt="${p.name}">
        <div class="row-info">
          <span class="row-name">${p.name}</span>
          <span class="row-region">${p.region}</span>
        </div>
        <span class="row-pts ${ptsColor}">${p.pts} pts</span>
      </div>`;
    }).join('');
  } else {
    document.getElementById('rankings-table').style.display = '';
    document.getElementById('tier-col-header').style.display = '';
    document.getElementById('tier-col-header').textContent = 'Tier';
    const list = document.getElementById('profile-list');
    if (list) list.style.display = 'none';

    const body = document.getElementById('table-body');
    if (!slice.length) { body.innerHTML = '<tr class="empty-row"><td colspan="4">No players ranked yet.</td></tr>'; return; }
    body.innerHTML = slice.map(p => {
      const initials = p.name.replace(/[^A-Za-z]/g,'').slice(0,2).toUpperCase() || '??';
      const rc = rankClass(p.rank);
      return `<tr class="${rc}" onclick="openModal('${p.name.replace(/'/g,"\\'")}')">
        <td><span class="rank-num">${p.rank}</span></td>
        <td><div class="player-cell">
          <div class="player-avatar"><img src="${avatarUrl(p.name)}" width="38" height="38" style="display:block;border-radius:5px;" onerror="this.outerHTML='<span class=\\'avatar-placeholder\\'>${initials}</span>'"></div>
          <span class="player-name">${p.name}</span>
        </div></td>
        <td><span class="region-badge">${p.region}</span></td>
        <td><div class="tiers-cell"><span class="tier-badge tier-${p.mainTier}">${p.mainTier}</span></div></td>
      </tr>`;
    }).join('');
  }
}

function renderPagination(total, page) {
  const pages = Math.ceil(total/PER_PAGE);
  const el = document.getElementById('pagination');
  if (pages <= 1) { el.innerHTML = ''; return; }
  let html = `<button class="page-btn" onclick="goPage(${page-1})" ${page===1?'disabled':''}>‹</button>`;
  for (let i=1;i<=pages;i++) {
    if (i===1||i===pages||Math.abs(i-page)<=1) html += `<button class="page-btn${i===page?' active':''}" onclick="goPage(${i})">${i}</button>`;
    else if (Math.abs(i-page)===2) html += `<span style="color:var(--muted);font-size:12px;padding:0 2px">…</span>`;
  }
  html += `<button class="page-btn" onclick="goPage(${page+1})" ${page===pages?'disabled':''}>›</button>`;
  el.innerHTML = html;
}

function goPage(p) { currentPage=p; renderTable(filtered,currentPage); renderPagination(filtered.length,currentPage); window.scrollTo({top:0,behavior:'smooth'}); }

function loadCategory(cat) {
  currentCat=cat; currentPage=1;
  document.getElementById('cat-label').textContent = LABELS[cat];
  document.getElementById('search').value = '';
  filtered = getPlayersForMode(cat);
  renderTable(filtered,1); renderPagination(filtered.length,1);
}

async function refresh() {
  await fetchPlayers();
  const q = document.getElementById('search').value.toLowerCase().trim();
  filtered = q ? getPlayersForMode(currentCat).filter(p => p.name.toLowerCase().includes(q)) : getPlayersForMode(currentCat);
  renderTable(filtered, currentPage); renderPagination(filtered.length, currentPage);
}

// MODAL
function openModal(name) {
  const p = allPlayers.find(x => x.name.toLowerCase() === name.toLowerCase());
  if (!p) return;
  const pts = getPoints(p);
  const sorted = [...allPlayers].sort((a,b) => getPoints(b)-getPoints(a));
  const pos = sorted.findIndex(x => x.name.toLowerCase() === name.toLowerCase()) + 1;

  document.getElementById('modal-avatar').src = `https://mc-heads.net/body/${encodeURIComponent(p.name)}/200`;
  document.getElementById('modal-name').textContent = p.name;
  document.getElementById('modal-rank-badge').textContent = getRankTitle(pts);
  document.getElementById('modal-region').textContent = REGION_NAMES[p.region] || p.region;
  document.getElementById('modal-namemc').href = `https://namemc.com/profile/${p.name}`;
  document.getElementById('modal-pos').textContent = pos ? `${pos}.` : '-';
  document.getElementById('modal-pts').textContent = `${pts} points`;

  const modeTiers = SCORE_MODES.filter(m => p.tiers?.[m]);
  document.getElementById('modal-tiers').innerHTML = modeTiers.length
    ? modeTiers.map(m => `<div class="modal-tier-row">
        <span class="modal-tier-mode">${MODE_LABELS[m]}</span>
        <span class="tier-badge tier-${p.tiers[m]}">${p.tiers[m]}</span>
      </div>`).join('')
    : '<div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--muted);font-size:13px">No mode tiers yet</div>';

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) { if (e.target === document.getElementById('modal-overlay')) closeModalBtn(); }
function closeModalBtn() { document.getElementById('modal-overlay').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalBtn(); });

document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadCategory(btn.dataset.cat);
});

document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase().trim();
  filtered = q ? getPlayersForMode(currentCat).filter(p => p.name.toLowerCase().includes(q)) : getPlayersForMode(currentCat);
  currentPage=1; renderTable(filtered,1); renderPagination(filtered.length,1);
  if (q) { const exact = allPlayers.find(p => p.name.toLowerCase() === q); if (exact) openModal(exact.name); }
});

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
